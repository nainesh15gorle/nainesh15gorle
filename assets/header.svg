<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1400"
     height="350"
     viewBox="0 0 1400 350">

    <!-- Background -->
    <rect width="1400" height="350" fill="#000000"/>

    <!-- Dot Grid -->
    <defs>
        <pattern id="dotGrid"
                 width="24"
                 height="24"
                 patternUnits="userSpaceOnUse">

            <circle
                cx="12"
                cy="12"
                r="1.4"
                fill="#2B2B2B"/>

        </pattern>
    </defs>

    <rect
        width="1400"
        height="350"
        fill="url(#dotGrid)"/>

    <!-- Outer Border -->
    <rect
        x="2"
        y="2"
        width="1396"
        height="346"
        fill="none"
        stroke="#181818"
        stroke-width="2"/>

    <!-- Main Card -->
    <rect
        x="20"
        y="20"
        width="1360"
        height="310"
        rx="32"
        fill="#0B0B0B"
        stroke="#2A2A2A"
        stroke-width="2"/>

    <!-- Corner Glyph -->
    <circle cx="55" cy="55" r="2" fill="#555"/>
    <circle cx="55" cy="67" r="2" fill="#555"/>
    <circle cx="55" cy="79" r="2" fill="#555"/>

    <circle cx="1345" cy="270" r="2" fill="#555"/>
    <circle cx="1345" cy="282" r="2" fill="#555"/>
    <circle cx="1345" cy="294" r="2" fill="#555"/>

    <!-- LED Glow -->
    <circle
        cx="90"
        cy="65"
        r="14"
        fill="white"
        opacity=".10"/>

    <!-- LED -->
    <circle
        cx="90"
        cy="65"
        r="7"
        fill="white">

        <animate
            attributeName="opacity"
            values="1;.25;1"
            dur="1.2s"
            repeatCount="indefinite"/>

    </circle>

    <!-- Status -->
    <text
        x="110"
        y="71"
        fill="#D0D0D0"
        font-size="18"
        font-family="monospace">

        STATUS : ONLINE

    </text>

    <!-- Version -->
    <text
        x="1310"
        y="71"
        fill="#666666"
        font-size="15"
        font-family="monospace"
        text-anchor="end">

        v2.0

    </text>

    <!-- Name -->
    <text
        x="700"
        y="145"
        fill="#FFFFFF"
        text-anchor="middle"
        font-size="56"
        font-weight="bold"
        font-family="monospace">

        NAINESH GORLE

    </text>

    <!-- Subtitle -->
    <text
        x="700"
        y="182"
        fill="#9B9B9B"
        text-anchor="middle"
        font-size="22"
        font-family="monospace">

        FULL STACK DEVELOPER

    </text>

    <!-- Divider -->
    <line
        x1="90"
        y1="220"
        x2="1310"
        y2="220"
        stroke="#2F2F2F"
        stroke-width="1"/>

    <!-- Boot Text -->
    <text
        x="90"
        y="252"
        fill="#E5E5E5"
        font-size="18"
        font-family="monospace">

        INITIALIZING SYSTEM...

    </text>

    <!-- Loading Track -->
    <rect
        x="90"
        y="272"
        width="1220"
        height="10"
        rx="5"
        fill="#1E1E1E"/>

    <!-- Loading Fill -->
    <rect
        x="90"
        y="272"
        width="0"
        height="10"
        rx="5"
        fill="#FFFFFF">

        <animate
            attributeName="width"
            from="0"
            to="1220"
            dur="2.2s"
            fill="freeze"/>

    </rect>

    <!-- Footer -->
    <text
        x="700"
        y="310"
        fill="#808080"
        font-size="16"
        text-anchor="middle"
        font-family="monospace">

        BUILD • LEARN • SHIP • REPEAT

    </text>

    <!-- Scan Lines -->
    <g opacity="0.03">

        <line x1="0" y1="30" x2="1400" y2="30" stroke="white"/>
        <line x1="0" y1="60" x2="1400" y2="60" stroke="white"/>
        <line x1="0" y1="90" x2="1400" y2="90" stroke="white"/>
        <line x1="0" y1="120" x2="1400" y2="120" stroke="white"/>
        <line x1="0" y1="150" x2="1400" y2="150" stroke="white"/>
        <line x1="0" y1="180" x2="1400" y2="180" stroke="white"/>
        <line x1="0" y1="210" x2="1400" y2="210" stroke="white"/>
        <line x1="0" y1="240" x2="1400" y2="240" stroke="white"/>
        <line x1="0" y1="270" x2="1400" y2="270" stroke="white"/>
        <line x1="0" y1="300" x2="1400" y2="300" stroke="white"/>

    </g>

</svg>
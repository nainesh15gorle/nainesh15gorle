<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg"
     width="1400"
     height="420"
     viewBox="0 0 1400 420">

    <!-- Background -->
    <rect width="1400" height="420" fill="#000000"/>

    <!-- Dot Grid -->
    <defs>
        <pattern id="dots"
                 width="24"
                 height="24"
                 patternUnits="userSpaceOnUse">

            <circle
                cx="12"
                cy="12"
                r="1.4"
                fill="#2B2B2B"/>

        </pattern>
    </defs>

    <rect width="1400"
          height="420"
          fill="url(#dots)"/>

    <!-- Card -->
    <rect
        x="20"
        y="20"
        width="1360"
        height="380"
        rx="30"
        fill="#0B0B0B"
        stroke="#2A2A2A"
        stroke-width="2"/>

    <!-- LED -->
    <circle
        cx="90"
        cy="60"
        r="14"
        fill="white"
        opacity=".10"/>

    <circle
        cx="90"
        cy="60"
        r="7"
        fill="white">

        <animate
            attributeName="opacity"
            values="1;.25;1"
            dur="1.2s"
            repeatCount="indefinite"/>

    </circle>

    <!-- Title -->
    <text
        x="110"
        y="67"
        fill="white"
        font-size="22"
        font-family="monospace"
        font-weight="bold">

        DEVELOPER PROFILE

    </text>

    <!-- Divider -->
    <line
        x1="80"
        y1="95"
        x2="1320"
        y2="95"
        stroke="#2E2E2E"/>

    <!-- Labels -->

    <text x="120" y="150"
          fill="#888"
          font-family="monospace"
          font-size="18">

        DEVELOPER

    </text>

    <text x="450" y="150"
          fill="white"
          font-family="monospace"
          font-size="18">

        Nainesh Gorle

    </text>

    <text x="120" y="190"
          fill="#888"
          font-family="monospace"
          font-size="18">

        ROLE

    </text>

    <text x="450" y="190"
          fill="white"
          font-family="monospace"
          font-size="18">

        Full Stack Developer

    </text>

    <text x="120" y="230"
          fill="#888"
          font-family="monospace"
          font-size="18">

        LOCATION

    </text>

    <text x="450" y="230"
          fill="white"
          font-family="monospace"
          font-size="18">

        India

    </text>

    <text x="120" y="270"
          fill="#888"
          font-family="monospace"
          font-size="18">

        FOCUS

    </text>

    <text x="450" y="270"
          fill="white"
          font-family="monospace"
          font-size="18">

        React • Node.js • TypeScript

    </text>

    <text x="120" y="310"
          fill="#888"
          font-family="monospace"
          font-size="18">

        STATUS

    </text>

    <text x="450" y="310"
          fill="white"
          font-family="monospace"
          font-size="18">

        ◉ ONLINE

    </text>

    <text x="120" y="350"
          fill="#888"
          font-family="monospace"
          font-size="18">

        MISSION

    </text>

    <text x="450" y="350"
          fill="white"
          font-family="monospace"
          font-size="18">

        Build clean and  scalable web applications

    </text>

</svg>
<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg"
     width="1400"
     height="340"
     viewBox="0 0 1400 340">

    <!-- Background -->
    <rect width="1400"
          height="340"
          fill="#000000"/>

    <!-- Dot Grid -->
    <defs>

        <pattern
            id="dots"
            width="24"
            height="24"
            patternUnits="userSpaceOnUse">

            <circle
                cx="12"
                cy="12"
                r="1.4"
                fill="#2B2B2B"/>

        </pattern>

    </defs>

    <rect
        width="1400"
        height="340"
        fill="url(#dots)"/>

    <!-- Main Card -->

    <rect
        x="20"
        y="20"
        width="1360"
        height="300"
        rx="30"
        fill="#0B0B0B"
        stroke="#2B2B2B"
        stroke-width="2"/>

    <!-- LED Glow -->

    <circle
        cx="90"
        cy="60"
        r="14"
        fill="white"
        opacity=".10"/>

    <!-- LED -->

    <circle
        cx="90"
        cy="60"
        r="7"
        fill="white">

        <animate
            attributeName="opacity"
            values="1;.25;1"
            dur="1.2s"
            repeatCount="indefinite"/>

    </circle>

    <!-- Title -->

    <text
        x="110"
        y="67"
        fill="white"
        font-size="22"
        font-family="monospace"
        font-weight="bold">

        SYSTEM STATUS

    </text>

    <!-- Divider -->

    <line
        x1="80"
        y1="95"
        x2="1320"
        y2="95"
        stroke="#2B2B2B"/>

    <!-- Left Column -->

    <text x="120" y="145"
          fill="#888"
          font-family="monospace"
          font-size="18">

        DEVELOPER

    </text>

    <text x="430"
          y="145"
          fill="white"
          font-family="monospace"
          font-size="18">

        Nainesh Gorle

    </text>

    <text x="120"
          y="185"
          fill="#888"
          font-family="monospace"
          font-size="18">

        ENVIRONMENT

    </text>

    <text x="430"
          y="185"
          fill="white"
          font-family="monospace"
          font-size="18">

        macOS

    </text>

    <text x="120"
          y="225"
          fill="#888"
          font-family="monospace"
          font-size="18">

        CURRENT FOCUS

    </text>

    <text x="430"
          y="225"
          fill="white"
          font-family="monospace"
          font-size="18">

        Full Stack • AI • Cloud

    </text>

    <!-- Right Column -->

    <text x="820"
          y="145"
          fill="#888"
          font-family="monospace"
          font-size="18">

        GITHUB

    </text>

    <text x="1060"
          y="145"
          fill="white"
          font-family="monospace"
          font-size="18">

        ACTIVE

    </text>

    <text x="820"
          y="185"
          fill="#888"
          font-family="monospace"
          font-size="18">

        PORTFOLIO

    </text>

    <text x="1060"
          y="185"
          fill="white"
          font-family="monospace"
          font-size="18">

        ONLINE

    </text>

    <text x="820"
          y="225"
          fill="#888"
          font-family="monospace"
          font-size="18">

        STATUS

    </text>

    <text x="1060"
          y="225"
          fill="white"
          font-family="monospace"
          font-size="18">

        OPEN TO COLLABORATE

    </text>

    <!-- Divider -->

    <line
        x1="90"
        y1="255"
        x2="1310"
        y2="255"
        stroke="#2B2B2B"/>

    <!-- Footer -->

    <text
        x="700"
        y="285"
        fill="#BBBBBB"
        font-family="monospace"
        font-size="18"
        text-anchor="middle">

        BUILD • LEARN • SHIP • REPEAT

    </text>

    <text
        x="700"
        y="310"
        fill="#666666"
        font-family="monospace"
        font-size="15"
        text-anchor="middle">

        © 2026 Nainesh Gorle

    </text>

</svg>

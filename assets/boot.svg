<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1400"
     height="320"
     viewBox="0 0 1400 320">

    <!-- Background -->
    <rect width="1400" height="320" fill="#000000"/>

    <!-- Dot Grid -->
    <defs>

        <pattern
            id="dots"
            width="24"
            height="24"
            patternUnits="userSpaceOnUse">

            <circle
                cx="12"
                cy="12"
                r="1.4"
                fill="#2B2B2B"/>

        </pattern>

    </defs>

    <rect
        width="1400"
        height="320"
        fill="url(#dots)"/>

    <!-- Card -->

    <rect
        x="20"
        y="20"
        width="1360"
        height="280"
        rx="30"
        fill="#0B0B0B"
        stroke="#2B2B2B"
        stroke-width="2"/>

    <!-- LED -->

    <circle
        cx="90"
        cy="60"
        r="14"
        fill="white"
        opacity=".08"/>

    <circle
        cx="90"
        cy="60"
        r="7"
        fill="white">

        <animate
            attributeName="opacity"
            values="1;.3;1"
            dur="1s"
            repeatCount="indefinite"/>

    </circle>

    <!-- Title -->

    <text
        x="110"
        y="67"
        fill="white"
        font-family="monospace"
        font-size="22"
        font-weight="bold">

        BOOT SEQUENCE

    </text>

    <!-- Terminal -->

    <text
        x="90"
        y="115"
        fill="#DDDDDD"
        font-family="monospace"
        font-size="20">

        > Initializing profile...

    </text>

    <text
        x="90"
        y="150"
        fill="#BBBBBB"
        font-family="monospace"
        font-size="20">

        > Loading repositories...

    </text>

    <text
        x="90"
        y="185"
        fill="#BBBBBB"
        font-family="monospace"
        font-size="20">

        > Connecting GitHub...

    </text>

    <text
        x="90"
        y="220"
        fill="#BBBBBB"
        font-family="monospace"
        font-size="20">

        > Loading portfolio...

    </text>

    <text
        x="90"
        y="255"
        fill="white"
        font-family="monospace"
        font-size="22">

        READY

        <tspan>

            █

            <animate
                attributeName="opacity"
                values="1;0;1"
                dur=".8s"
                repeatCount="indefinite"/>

        </tspan>

    </text>

    <!-- Decorative Dots -->

    <circle cx="1345" cy="250" r="2" fill="#555"/>
    <circle cx="1345" cy="262" r="2" fill="#555"/>
    <circle cx="1345" cy="274" r="2" fill="#555"/>

</svg>

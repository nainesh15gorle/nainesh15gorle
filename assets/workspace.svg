<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg"
     width="1400"
     height="450"
     viewBox="0 0 1400 450">

    <!-- Background -->

    <rect width="1400"
          height="450"
          fill="#000000"/>

    <!-- Dot Grid -->

    <defs>

        <pattern id="dots"
                 width="24"
                 height="24"
                 patternUnits="userSpaceOnUse">

            <circle
                cx="12"
                cy="12"
                r="1.4"
                fill="#2A2A2A"/>

        </pattern>

    </defs>

    <rect
        width="1400"
        height="450"
        fill="url(#dots)"/>

    <!-- Card -->

    <rect
        x="20"
        y="20"
        width="1360"
        height="410"
        rx="30"
        fill="#0B0B0B"
        stroke="#2A2A2A"
        stroke-width="2"/>

    <!-- LED -->

    <circle
        cx="90"
        cy="60"
        r="14"
        fill="white"
        opacity=".10"/>

    <circle
        cx="90"
        cy="60"
        r="7"
        fill="white">

        <animate
            attributeName="opacity"
            values="1;.3;1"
            dur="1.2s"
            repeatCount="indefinite"/>

    </circle>

    <!-- Title -->

    <text
        x="110"
        y="67"
        fill="white"
        font-size="22"
        font-family="monospace"
        font-weight="bold">

        CURRENT WORKSPACE

    </text>

    <!-- Divider -->

    <line
        x1="80"
        y1="95"
        x2="1320"
        y2="95"
        stroke="#2E2E2E"/>

    <!-- Information -->

    <text x="120" y="150"
          fill="#888"
          font-family="monospace"
          font-size="18">

        ACTIVE PROJECT

    </text>

    <text x="500" y="150"
          fill="white"
          font-family="monospace"
          font-size="18">

        Spatial Computing Lab Portal

    </text>

    <text x="120" y="195"
          fill="#888"
          font-family="monospace"
          font-size="18">

        TECH STACK

    </text>

    <text x="500" y="195"
          fill="white"
          font-family="monospace"
          font-size="18">

        React • TypeScript • Supabase

    </text>

    <text x="120" y="240"
          fill="#888"
          font-family="monospace"
          font-size="18">

        STATUS

    </text>

    <text x="500" y="240"
          fill="white"
          font-family="monospace"
          font-size="18">

        ACTIVE DEVELOPMENT

    </text>

    <text x="120" y="285"
          fill="#888"
          font-family="monospace"
          font-size="18">

        NEXT GOAL

    </text>

    <text x="500" y="285"
          fill="white"
          font-family="monospace"
          font-size="18">

        Refactoring Admin portal

    </text>

    <text x="120" y="330"
          fill="#888"
          font-family="monospace"
          font-size="18">

        LAST UPDATE

    </text>

    <text x="500" y="330"
          fill="white"
          font-family="monospace"
          font-size="18">

        Today

    </text>

    <!-- Progress Title -->

    <text
        x="120"
        y="380"
        fill="#888"
        font-size="18"
        font-family="monospace">

        DEVELOPMENT PROGRESS

    </text>

    <!-- Progress Background -->

    <rect
        x="500"
        y="366"
        width="650"
        height="14"
        rx="7"
        fill="#202020"/>

    <!-- Progress Fill -->

    <rect
        x="500"
        y="366"
        width="500"
        height="14"
        rx="7"
        fill="white"/>

    <!-- Percentage -->

    <text
        x="1170"
        y="379"
        fill="white"
        font-size="18"
        font-family="monospace">

        85%

    </text>

</svg>

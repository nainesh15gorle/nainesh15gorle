<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg"
     width="1400"
     height="520"
     viewBox="0 0 1400 520">

    <!-- Background -->
    <rect width="1400"
          height="520"
          fill="#000000"/>

    <!-- Dot Grid -->
    <defs>

        <pattern
            id="dots"
            width="24"
            height="24"
            patternUnits="userSpaceOnUse">

            <circle
                cx="12"
                cy="12"
                r="1.4"
                fill="#2B2B2B"/>

        </pattern>

    </defs>

    <rect
        width="1400"
        height="520"
        fill="url(#dots)"/>

    <!-- Main Card -->

    <rect
        x="20"
        y="20"
        width="1360"
        height="480"
        rx="30"
        fill="#0B0B0B"
        stroke="#2B2B2B"
        stroke-width="2"/>

    <!-- LED -->

    <circle
        cx="90"
        cy="60"
        r="14"
        fill="white"
        opacity=".10"/>

    <circle
        cx="90"
        cy="60"
        r="7"
        fill="white">

        <animate
            attributeName="opacity"
            values="1;.25;1"
            dur="1.2s"
            repeatCount="indefinite"/>

    </circle>

    <!-- Title -->

    <text
        x="110"
        y="67"
        fill="white"
        font-size="22"
        font-family="monospace"
        font-weight="bold">

        SKILL MATRIX

    </text>

    <!-- Divider -->

    <line
        x1="80"
        y1="95"
        x2="1320"
        y2="95"
        stroke="#2B2B2B"/>

    <!-- ===== Frontend ===== -->

    <text x="120" y="150"
          fill="#A0A0A0"
          font-family="monospace"
          font-size="18">

        FRONTEND

    </text>

    <rect x="450" y="138"
          width="550"
          height="12"
          rx="6"
          fill="#202020"/>

    <rect x="450" y="138"
          width="520"
          height="12"
          rx="6"
          fill="white"/>

    <text x="1030"
          y="150"
          fill="white"
          font-family="monospace"
          font-size="18">

        95%

    </text>

    <!-- ===== Backend ===== -->

    <text x="120" y="210"
          fill="#A0A0A0"
          font-family="monospace"
          font-size="18">

        BACKEND

    </text>

    <rect x="450"
          y="198"
          width="550"
          height="12"
          rx="6"
          fill="#202020"/>

    <rect x="450"
          y="198"
          width="470"
          height="12"
          rx="6"
          fill="white"/>

    <text x="1030"
          y="210"
          fill="white"
          font-family="monospace"
          font-size="18">

        85%

    </text>

    <!-- ===== Database ===== -->

    <text x="120"
          y="270"
          fill="#A0A0A0"
          font-family="monospace"
          font-size="18">

        DATABASE

    </text>

    <rect x="450"
          y="258"
          width="550"
          height="12"
          rx="6"
          fill="#202020"/>

    <rect x="450"
          y="258"
          width="400"
          height="12"
          rx="6"
          fill="white"/>

    <text x="1030"
          y="270"
          fill="white"
          font-family="monospace"
          font-size="18">

        72%

    </text>

    <!-- ===== UI ===== -->

    <text x="120"
          y="330"
          fill="#A0A0A0"
          font-family="monospace"
          font-size="18">

        UI / UX

    </text>

    <rect x="450"
          y="318"
          width="550"
          height="12"
          rx="6"
          fill="#202020"/>

    <rect x="450"
          y="318"
          width="485"
          height="12"
          rx="6"
          fill="white"/>

    <text x="1030"
          y="330"
          fill="white"
          font-family="monospace"
          font-size="18">

        88%

    </text>

    <!-- ===== Programming ===== -->

    <text x="120"
          y="390"
          fill="#A0A0A0"
          font-family="monospace"
          font-size="18">

        PROGRAMMING

    </text>

    <rect x="450"
          y="378"
          width="550"
          height="12"
          rx="6"
          fill="#202020"/>

    <rect x="450"
          y="378"
          width="495"
          height="12"
          rx="6"
          fill="white"/>

    <text x="1030"
          y="390"
          fill="white"
          font-family="monospace"
          font-size="18">

        75%

    </text>

    <!-- ===== Problem Solving ===== -->

    <text x="120"
          y="450"
          fill="#A0A0A0"
          font-family="monospace"
          font-size="18">

        PROBLEM SOLVING

    </text>

    <rect x="450"
          y="438"
          width="550"
          height="12"
          rx="6"
          fill="#202020"/>

    <rect x="450"
          y="438"
          width="505"
          height="12"
          rx="6"
          fill="white"/>

    <text x="1030"
          y="450"
          fill="white"
          font-family="monospace"
          font-size="18">

        92%

    </text>

</svg>
